version: 2

sources:
  - name: illuminate
    description: Raw tables for Illuminate assessments
    schema: illuminate
    tables:
      - name: illuminate_assessment_results
        description: Raw table for Illuminate assessment results

  - name: iready
    description: Raw tables for iReady assessments
    schema: iready
    tables:
      - name: iready_assessment_results
        description: Raw table for iReady assessment results

  - name: star
    description: Raw tables for STAR assessments
    schema: star
    tables:
      - name: star_assessment_results
        description: Raw table for STAR assessment results

  - name: dibels
    description: Raw tables for DIBELS assessments
    schema: dibels
    tables:
      - name: dibels_assessment_results
        description: Raw table for DIBELS assessment results

  - name: state_testing
    description: Raw tables for SBAC & Interim assessments
    schema: state_testing
    tables:
      - name: sbac_2024
        description: Raw table for SBAC 2024 assessment results
      - name: IA2_assessment_results_view
        description: Raw table for IA2 assessment results
      - name: IA3_assessment_results_view
        description: Raw table for IA3 assessment results

  - name: pear
    description: Raw tables for PEAR assignments
    schema: pear
    tables:
      - name: pear_assignment_responses_view
        description: View of assignment responses in PEAR
      - name: pear_assignment_summaries_view
        description: View of assignment summaries in PEAR

models:
  - name: main
    description: >
      A materialized view combining assessment results from multiple sources
      (Illuminate, iReady, STAR, DIBELS, SBAC, IA2, IA3, PEAR, state_testing_continuous ICA) into a unified dataset.
    columns:
      - name: data_source
        description: The source of the assessment data (e.g., Illuminate, iReady).
        # tests:
          # - not_null
          # - unique
      - name: assessment_id
        description: The unique identifier for the assessment.
        # tests:
          # - not_null
      - name: year
        description: The year the assessment was taken.
        # tests:
          # - not_null
      - name: date_taken
        description: The date the assessment was taken.
      - name: grade
        description: The grade level of the student.
      - name: local_student_id
        description: The unique identifier for the student.
        # tests:
          # - not_null
      - name: test_type
        description: The type of test administered.
      - name: curriculum
        description: The curriculum associated with the assessment.
      - name: unit
        description: The unit of the assessment.
      - name: unit_labels
        description: Labels for the units in the assessment.
      - name: title
        description: The title of the assessment.
      - name: standard_code
        description: The standard code associated with the assessment.
      - name: score
        description: The score achieved by the student.
      - name: performance_band_level
        description: The performance band level of the student.
      - name: performance_band_label
        description: The label for the performance band.
      - name: proficiency
        description: The proficiency level of the student.

  - name: main_elem
    description: >
      Elementary (grades 0-5) assessment data from main, Illuminate only,
      joined to student_to_teacher. Use this instead of main_illuminate_elementary.

  - name: curriculum_assessments
    description: >
      K-5 curriculum assessments aligned with the main_illuminate_elementary / 2.0 Curriculum Data spec:
      BigQuery materialized view over main_elem—Illuminate only, curriculum ELA/Math/Science,
      standard_code contains percent, excludes checkpoint and exit ticket test types.
      Grades 0–5 come from main_elem.

  - name: verified_assessments
    description: >
      Verified assessments (iReady and DIBELS): student_to_teacher + main + diagnostic (deduped to one row per
      local_student_id, preferring richer EOY fields). Grain is one row per main skill/standard_code per student-year
      (long-format iReady/DIBELS from main). Grade 0–12, data_source iready or dibels. Views dataset.
    columns:
      - name: year
        description: School year (student_to_teacher / main).
      - name: data_source
        description: From main; restricted to iready or dibels by model filters.
      - name: unit
        description: From main (iReady/DIBELS assessment unit).
      - name: score
        description: >
          Numeric only: SAFE_CAST of main.score to FLOAT64 after trim. NULL when main.score is text
          (e.g. Well Below Benchmark) or empty; that text is carried in proficiency instead.
      - name: proficiency
        description: >
          From main.proficiency when main.score parses as numeric; otherwise COALESCE(main.proficiency, main.score)
          so labels formerly only in score are retained.
      - name: standard_code
        description: From main.

  - name: main_ms
    description: >
      Middle school (grades 6-8) assessment data from main, Illuminate and PEAR,
      joined to student_to_teacher. Use this instead of main_illuminate_middle. 

  - name: main_hs
    description: >
      High school (grades 9-12) assessment data from main, Illuminate and PEAR,
      joined to student_to_teacher. Use this instead of main_illuminate_high.
